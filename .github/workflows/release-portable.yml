# Builds self-contained portable ZIPs and attaches them to a GitHub Release when you push a version tag (e.g. v1.0.0).
# See docs/GITHUB.md

name: Release portable builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build portable ZIPs (win-x64, win-x86, win-arm64)
        shell: pwsh
        run: |
          $root = "${{ github.workspace }}"
          foreach ($r in @('win-x64', 'win-x86', 'win-arm64')) {
            & "$root/scripts/publish-portable.ps1" -Runtime $r
          }

      - name: Upload artifacts (manual / test runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: LyllyPlayer-portable-zips
          path: artifacts/LyllyPlayer-portable-*.zip

      - name: Create GitHub Release with ZIPs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/LyllyPlayer-portable-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
